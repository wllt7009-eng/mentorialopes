<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referências  - MentoriaLopes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
    body {
        margin: 0;
        padding: 20px;
        font-family: 'Orbitron', sans-serif;
        background-color: #050505;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    /* Título Neon */
    h1 {
        font-size: 2rem;
        text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
        text-align: center;
        margin-bottom: 30px;
    }

    /* Container com bordas girando */
    .neon-box {
        width: 100%;
        max-width: 480px;
        background: #050505;
        border-radius: 20px;
        padding: 20px;
        position: relative;
        z-index: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 25px;
    }

    .neon-box::before {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: conic-gradient(#00d2ff, #3a0ca3, #f72585, #4cc9f0, #00d2ff);
        animation: rodar 4s linear infinite;
        z-index: -2;
    }

    .neon-box::after {
        content: '';
        position: absolute;
        inset: 4px;
        background: #050505;
        border-radius: 16px;
        z-index: -1;
    }

    @keyframes rodar {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* AJUSTE PARA NÃO CORTAR AS FOTOS */
    .item-prova img, .item-prova video {
        width: 100%;
        height: auto; /* A altura se ajusta ao conteúdo */
        display: block;
        border-radius: 12px;
        border: 2px solid #00d2ff;
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        object-fit: contain; /* Mostra a foto inteira sem cortes */
    }

    .item-prova p {
        font-size: 0.9rem;
        color: #00d2ff;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    .btn-voltar {
        margin: 30px 0;
        text-decoration: none;
        color: #fff;
        padding: 15px 30px;
        border: 2px solid #00d2ff;
        border-radius: 10px;
        box-shadow: 0 0 10px #00d2ff;
        transition: 0.3s;
    }
    </style>
    
</head>
<body>

    <h1><i class="fas fa-bolt"></i> REFERENCIAS <i class="fas fa-bolt"></i></h1>

    <div class="neon-box">
        
        <div class="item-prova">
            <p><i class="fas fa-chart-line"></i>  Compra feita ✅ #1</p>
            <img src="IMG_20260415_171412_447.jpg" alt="Prova de Resultado" class="img-prova">
        
        </div><div class="item-prova">
            <p>Prova #2</p>
            <img src="IMG_20260412_202905_863.jpg" alt="Prova 2">
        
        </div><div class="item-prova">
            <p>Prova #3</p>
            <img src="IMG_20260415_180443_252.jpg" alt="Prova 3">
        </div>

        <div class="item-prova">
    <p><i class="fas fa-play-circle"></i> Vendas de contas 🍊</p>
    <video controls style="width: 100%; border-radius: 12px; border: 2px solid #00d2ff; box-shadow: 0 0 15px #00d2ff;">
        <source src="VID_20260415_183848.mp4" type="video/mp4">
        Seu navegador não suporta a reprodução de vídeos.
    </video>
        </div>
        
            </div>
                <div class="item-prova">
            <p><i class="fas fa-check-double"></i> Resultado Confirmado</p>
            <img src="IMG_20260415_180849_200.jpg" alt="Prova 4">
        </div>

        <div class="item-prova">
            <p><i class="fas fa-receipt"></i> Operação Concluída</p>
            <img src="IMG_20260415_180909_610.jpg" alt="Prova 5">
        </div>

        <div class="item-prova">
            <p><i class="fas fa-shield-alt"></i> Verificado no Sistema</p>
            <img src="IMG_20260415_180930_953.jpg" alt="Prova 6">
        </div>

        <div class="item-prova">
            <p><i class="fas fa-wallet"></i> Saldo em Conta</p>
            <img src="IMG_20260415_180900_257.jpg" alt="Prova 7">
        </div>

        <div class="item-prova">
            <p><i class="fas fa-chart-line"></i> Escala de Vendas</p>
            <img src="IMG_20260415_180926_791.jpg" alt="Prova 8">
        </div>
            

    </div>

    <a href="index.html" class="btn-voltar">
        <i class="fas fa-arrow-left"></i> Voltar pro Clean
    </a>

    <footer style="margin-top: auto; padding: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.3);">
        MentoriaLopes CyberDivision 2026
    </footer>

</body>
</html>
