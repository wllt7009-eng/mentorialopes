<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentoriaLopes</title>
    <style>
        /* Cores fiéis ao seu design */
        :root {
            --bege-fundo: #f2e8d9;
            --marrom-topo: #4a3a2e;
            --laranja-botao: #f5a661;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bege-fundo);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Topo Marrom */
        .header {
            width: 100%;
            background-color: var(--marrom-topo);
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .profile-img {
            width: 210px;
            height: auto;
            border-bottom: 6px solid var(--bege-fundo);
        }

        h1 {
            font-size: 2.5rem;
            margin: 25px 0;
            color: #1a1a1a;
            font-weight: 800;
        }

        h1 span { color: #8c7a6b; font-weight: 400; }

        /* Card Branco */
        .card {
            background: #ffffff;
            width: 88%;
            max-width: 400px;
            padding: 40px 25px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 40px;
        }

        /* Botão Laranja */
        .btn-link {
            display: block;
            background-color: var(--laranja-botao);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .description {
            font-size: 0.9rem;
            color: #333;
            line-height: 1.4;
            margin-bottom: 35px;
        }

        .links-extra {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #f0f0f0;
            padding-top: 25px;
        }

        .link-item { 
            color: #666; 
            text-decoration: none; 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        footer { 
            margin-top: auto; 
            padding-bottom: 25px; 
            font-size: 0.8rem; 
            color: #8c7a6b; 
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="perfil.jpg" alt="MentoriaLopes" class="profile-img">
    </div>

    <h1>Mentoria<span>Lopes</span></h1>

    <div class="card">
        <a href="https://wa.me/5500000000000" class="btn-link">
            🍊 laranjas aq
        </a>
        <p class="description">
            (este link te leva pra meu wtsaap pessoal,<br>
            não é ilegal, são literalmente laranjas)
        </p>

        <div class="links-extra">
            <a href="#" class="link-item">👤 Minha Biografia</a>
            <a href="#" class="link-item">💬 Depoimentos</a>
        </div>
    </div>

    <footer>
        MentoriaLopes 2026
    </footer>

</body>
</html>
