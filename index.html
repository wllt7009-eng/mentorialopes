<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentoriaLopes | Premium Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* MUDANÇA TOTAL DE CORES: DARK & GOLD VÍVIDO */
            --bg-deep-dark: #0a0a0a;
            --bg-card-dark: rgba(20, 20, 20, 0.6); /* Transparente / Glassmorphism */
            --gold-vivid: #ffd700; /* Dourado Vivo */
            --gold-glow: rgba(255, 215, 0, 0.4); /* Brilho do Dourado */
            --orange-vivid: #ff8c00; /* Laranja Vivo */
            --orange-glow: rgba(255, 140, 0, 0.3);
            --text-light: #eeeeee;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            /* Fundo Escuro Profundo com um leve reflexo radial */
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            /* Camada de mistura para o gradiente suavizar para o escuro */
            background-image: 
                linear-gradient(to bottom, rgba(10,10,10,0) 60%, var(--bg-deep-dark) 100%),
                url('e30ebd2962bc386bf9a98cbe3ff0c217.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            padding: 80px 0 50px 0;
            position: relative;
        }

        /* Sobreposição escura para destacar a foto de perfil */
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 1;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            /* Borda dourada e brilhante */
            border: 3px solid var(--gold-vivid);
            box-shadow: 0 0 20px var(--gold-glow);
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 2.2rem;
            margin: 25px 0;
            font-weight: 800;
            color: var(--text-light);
            text-align: center;
            letter-spacing: -1px;
        }

        h1 span { color: var(--gold-vivid); font-weight: 400; text-shadow: 0 0 10px var(--gold-glow); }

        .card {
            background: var(--bg-card-dark);
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 24px;
            /* Efeito de Vidro (Glassmorphism) */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.15); /* Borda dourada sutil */
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            margin-bottom: 30px;
        }

        .btn-link {
            display: block;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de brilho neon nos botões */
        .btn-link::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn-link:hover::after {
            left: 100%;
        }

        /* Botão Laranjas: Laranja Vívido com Brilho */
        .btn-orange {
            background-color: var(--orange-vivid);
            color: #fff;
            box-shadow: 0 4px 15px var(--orange-glow);
        }
        .btn-orange:hover { box-shadow: 0 0 25px var(--orange-glow); }

        /* Botão CC: Preto/Dourado Premium */
        .btn-dark-gold {
            background-color: #111;
            color: var(--gold-vivid);
            border: 1px solid var(--gold-vivid);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-dark-gold:hover { background-color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }

        /* Botão Contas: Dourado Vívido com Brilho Intenso */
        .btn-gold {
            background-color: var(--gold-vivid);
            color: #000;
            box-shadow: 0 4px 20px var(--gold-glow);
        }
        .btn-gold:hover { box-shadow: 0 0 30px var(--gold-glow); }

        .btn-link:active { transform: scale(0.96); }

        .description {
            font-size: 0.8rem;
            color: #999;
            line-height: 1.6;
            margin: 20px 0 30px 0;
            font-weight: 400;
        }

        .footer-links {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 25px;
        }

        .link-item { 
            color: #bbb; 
            text-decoration: none; 
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .link-item i { color: var(--gold-vivid); text-shadow: 0 0 5px var(--gold-glow); }
        .link-item:hover { color: #fff; }

        .social-links {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .social-links a {
            color: #555;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .social-links a:hover {
            color: var(--gold-vivid);
            text-shadow: 0 0 10px var(--gold-glow);
            transform: translateY(-3px);
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.75rem;
            color: #666;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            width: 100%;
        }
    </style>
</head>
<body>
    
    <div id="music-player" style="position: fixed; top: 15px; right: 15px; z-index: 9999;">
        <button onclick="toggleMusic()" id="music-btn" style="background: rgba(0, 200, 83, 0.1); border: 1px solid #00c853; color: #00c853; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s;">
            <i class="fas fa-music" id="music-icon"></i>
        </button>
        <audio id="bg-audio" loop>
            <source src="musicado7 💸(MP3).mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function toggleMusic() {
            const audio = document.getElementById('bg-audio');
            const icon = document.getElementById('music-icon');
            const btn = document.getElementById('music-btn');
            if (audio.paused) {
                audio.play(); icon.classList.remove('fa-music'); icon.classList.add('fa-pause');
                btn.style.background = '#00c853'; btn.style.color = '#fff';
            } else {
                audio.pause(); icon.classList.remove('fa-pause'); icon.classList.add('fa-music');
                btn.style.background = 'rgba(0, 200, 83, 0.1)'; btn.style.color = '#00c853';
            }
        }
        document.getElementById('bg-audio').volume = 0.5;
    </script>
    
    <div class="header">
        <img src="perfil.jpg" alt="MentoriaLopes" class="profile-img">
    </div>

    <h1>Mentoria<span>Lopes</span></h1>

    <div class="card">
        <a href="https://wa.me/5538997404945?text=Vim%20pelo%20Insta" class="btn-link btn-orange">
            🍊 laranjas aq
        </a>
        <a href="referencias.html" class="btn-link btn-dark-gold">
            ⭐ CC; (Referencias de venda)
        </a>
        <a href="produtos.html" class="btn-link btn-gold">
            💰 Venda de contas recargapay com saldo 
        </a>

        <p class="description">
            (este link te leva pra meu wtsaap pessoal,<br>
            la te explico como funciona os trampos)
        </p>

        <div class="footer-links">
            <a href="#" class="link-item"><i class="fas fa-user-tie"></i> Minha Biografia</a>
            <a href="#" class="link-item"><i class="fas fa-comments"></i> Depoimentos</a>
        </div>
    </div>

    <div class="social-links">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <footer>
        MentoriaLopes © 2026 | Premium Access Division
    </footer>

</body>
</html>
