<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentoriaLopes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-bege: #f2e8d9;
            /* MUDANÇA 1: A cor do topo agora é um degradê escuro que combina com a foto */
            --topo-gradiente-inicio: #1a1a1a; /* Escuro profundo */
            --topo-gradiente-fim: #2a2a2a;    /* Ligeiramente mais claro */
            --laranja-botao: #f5a661;
            --texto-escuro: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-bege);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* MUDANÇA 2: O cabeçalho agora usa a imagem e o gradiente para misturar */
        .header {
            width: 100%;
            /* 2a. Imagem de fundo e gradiente de mistura */
            background-image: 
                /* Este gradiente faz a parte de baixo da imagem suavizar para o bege do fundo */
                linear-gradient(to bottom, rgba(26,26,26,0) 70%, var(--bg-bege) 100%),
                /* Substitua 'capa-pagamento.jpg' pelo nome da sua foto de cartões dourados */
                url('e30ebd2962bc386bf9a98cbe3ff0c217.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            display: flex;
            justify-content: center;
            /* Aumentei um pouco o padding para o topo escuro aparecer mais */
            padding: 70px 0 50px 0; 
            position: relative;
        }

        /* Opcional: Adiciona uma leve sobreposição escura para destacar a foto de perfil */
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.3); /* Escurece a imagem de fundo levemente */
            z-index: 1;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            /* MUDANÇA 3: A borda agora é preta para combinar com a nova estética escura */
            border: 4px solid #1a1a1a; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative; /* Para ficar acima da sobreposição escura */
            z-index: 2;
        }

        /* RESTO DO CÓDIGO PERMANECE IGUAL (como você pediu) */

        h1 {
            font-size: 2.2rem;
            margin: 20px 0;
            font-weight: 800;
            color: var(--texto-escuro);
        }

        h1 span { color: #8c7a6b; font-weight: 400; }

        .card {
            background: #ffffff;
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
            z-index: 2; /* Garante que o card fique acima da mistura do gradiente */
        }

        .btn-link {
            display: block;
            background-color: var(--laranja-botao);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 166, 97, 0.3);
        }

        .btn-link:active {
            transform: scale(0.95);
        }

        .description {
            font-size: 0.85rem;
            color: #555;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .footer-links {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .link-item { 
            color: #666; 
            text-decoration: none; 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .link-item i { color: #4a3a2e; }

        footer { margin-top: auto; padding: 20px; font-size: 0.8rem; color: #8c7a6b; }
    </style>
</head>
<body>
    <div id="music-player" style="position: fixed; top: 15px; right: 15px; z-index: 9999;">
        <button onclick="toggleMusic()" id="music-btn" style="background: rgba(0, 200, 83, 0.1); border: 1px solid #00c853; color: #00c853; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s;">
            <i class="fas fa-music" id="music-icon"></i>
        </button>
        <audio id="bg-audio" loop>
            <source src="musicado7 💸(MP3).mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function toggleMusic() {
            const audio = document.getElementById('bg-audio');
            const icon = document.getElementById('music-icon');
            const btn = document.getElementById('music-btn');

            if (audio.paused) {
                audio.play();
                icon.classList.remove('fa-music');
                icon.classList.add('fa-pause');
                btn.style.background = '#00c853';
                btn.style.color = '#fff';
            } else {
                audio.pause();
                icon.classList.remove('fa-pause');
                icon.classList.add('fa-music');
                btn.style.background = 'rgba(0, 200, 83, 0.1)';
                btn.style.color = '#00c853';
            }
        }
        
        document.getElementById('bg-audio').volume = 0.5;
    </script>
    
    <div class="header">
        <img src="perfil.jpg" alt="MentoriaLopes" class="profile-img">
    </div>

    <h1>Mentoria<span>Lopes</span></h1>

    <div class="card">
        <a href="https://wa.me/5538997404945?text=Vim%20pelo%20Insta" class="btn-link">
            🍊 laranjas aq
        </a>
        <a href="referencias.html" class="btn-link" style="background-color: #4a3a2e; font-size: 1.2rem; margin-top: 15px;">
            ⭐ CC; (Referencias de venda)
        </a>
        <a href="produtos.html" class="btn-link" style="background-color: #d4af37; color: #000; font-weight: bold;">
            💰 Venda de contas recargapay com saldo 
        </a>

        <p class="description">
            (este link te leva pra meu wtsaap pessoal,<br>
            la te explico como funciona os trampos)
        </p>

        <div class="footer-links">
            <a href="#" class="link-item"><i class="fas fa-user"></i> Minha Biografia</a>
            <a href="#" class="link-item"><i class="fas fa-comment-dots"></i> Depoimentos</a>
        </div>
    </div>

    <div style="margin-top: 20px; display: flex; gap: 15px;">
        <a href="#" style="color: #4a3a2e;"><i class="fab fa-facebook"></i></a>
        <a href="#" style="color: #4a3a2e;"><i class="fab fa-instagram"></i></a>
        <a href="#" style="color: #4a3a2e;"><i class="fab fa-youtube"></i></a>
    </div>

    <footer>
        MentoriaLopes 2026
    </footer>

</body>
</html>
