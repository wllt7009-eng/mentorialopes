<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recarga Oficial - MentoriaLopes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cores extraídas da primeira página para manter o charme */
            --gold-vivid: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --bg-deep-dark: #0a0a0a;
            --text-light: #eeeeee;
            --card-glass: rgba(0, 0, 0, 0.75);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Cabeçalho Black & Gold */
        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 1.6rem;
            color: var(--text-light);
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .header h1 span { color: var(--gold-vivid); text-shadow: 0 0 10px var(--gold-glow); }

        .btn-video {
            display: inline-block;
            margin-top: 15px;
            background: transparent;
            color: var(--gold-vivid);
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--gold-vivid);
            box-shadow: 0 0 10px var(--gold-glow);
            transition: 0.3s;
        }

        /* Grade de Blocos com a imagem do dragão */
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .price-card {
            position: relative;
            height: 110px;
            border-radius: 16px;
            overflow: hidden; /* Corta a imagem nas bordas arredondadas */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Imagem de fundo do bloco (Dragão Dourado) */
        .price-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('1000804582.jpg'); /* Sua imagem de fundo */
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Camada de mistura para o texto aparecer (Overlay) */
        .price-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        .price-card:active { transform: scale(0.95); border-color: var(--gold-vivid); }

        .card-content {
            position: relative;
            z-index: 3; /* Fica acima da imagem e do fundo preto */
            text-align: center;
        }

        .saldo-label { font-size: 0.65rem; color: #bbb; text-transform: uppercase; font-weight: 400; }
        .saldo-valor { font-size: 1.2rem; font-weight: 800; color: #fff; margin: 2px 0; display: block; }
        .preco-tag { color: var(--gold-vivid); font-weight: 700; font-size: 0.95rem; text-shadow: 0 0 5px rgba(0,0,0,0.5); }

        /* Ações */
        .action-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            text-align: center;
        }

        .action-box h2 { font-size: 1.1rem; margin-bottom: 15px; color: var(--gold-vivid); }

        .btn-main {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-pix { background: #fff; color: #000; }
        .btn-wpp { background: #25d366; color: #fff; text-decoration: none; }

        #toast {
            visibility: hidden;
            background-color: var(--gold-vivid);
            color: #000;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 10;
            bottom: 30px;
            font-weight: 700;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .btn-voltar {
            display: block;
            text-align: center;
            margin: 20px 0;
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div id="toast">CHAVE PIX COPIADA! 💰</div>

<div class="container">
    <div class="header">
        <h1>RECARGA MENTORIA<span>LOPES</span></h1>
        <a href="referencias.html" class="btn-video">
            <i class="fas fa-play-circle"></i> ASSISTIR VÍDEO EXPLICATIVO
        </a>
    </div>

    <p style="text-align:center; font-size: 0.8rem; color: #aaa; margin-bottom: 15px;">Escolha o valor desejado na tabela abaixo:</p>

    <div class="price-grid">
        <script>
            const produtos = [
                {s: "400", v: "60"}, {s: "610", v: "85"}, {s: "720", v: "95"}, 
                {s: "800", v: "110"}, {s: "900", v: "120"}, {s: "1.050", v: "135"},
                {s: "1.550", v: "150"}, {s: "2.120", v: "170"}, {s: "2.550", v: "280"},
                {s: "3.500", v: "350"}, {s: "4.100", v: "400"}, {s: "5.100", v: "500"},
                {s: "6.200", v: "600"}, {s: "7.400", v: "700"}, {s: "10.200", v: "1.000"}
            ];

            produtos.forEach(p => {
                document.write(`
                    <div class="price-card">
                        <div class="card-content">
                            <span class="saldo-label">SALDO</span>
                            <span class="saldo-valor">R$ ${p.s}</span>
                            <span class="preco-tag">Pague R$ ${p.v}</span>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="action-box">
        <h2>Finalize seu Pedido</h2>
        
        <button class="btn-main btn-pix" onclick="copyPix()">
            <i class="fas fa-copy"></i> COPIAR CHAVE PIX
        </button>

        <a href="https://wa.me/556183290023?text=Mande%20seu%20comprovante%20aq" class="btn-main btn-wpp">
            <i class="fab fa-whatsapp"></i> ENVIAR COMPROVANTE
        </a>
        
        <p style="font-size: 0.65rem; color: #777; margin-top: 10px;">
            A chave é aleatória. Copie, pague no seu banco e envie o print.
        </p>
    </div>

    <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao menu anterior</a>
</div>

<script>
    function copyPix() {
        const chave = "73207087-03ad-4b5c-9608-8e453dbafb18";
        navigator.clipboard.writeText(chave).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        });
    }
</script>

</body>
</html>
