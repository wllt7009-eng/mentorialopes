<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga Oficial - MentoriaLopes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #00c853;
            --dark-green: #009624;
            --bg-light: #f4f7f6;
            --text-dark: #1d1d1d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--dark-green);
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .btn-video {
            display: inline-block;
            margin-top: 15px;
            background: #fff;
            color: var(--dark-green);
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            border: 2px solid var(--primary-green);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Grade de Blocos */
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .price-card {
            background: #fff;
            padding: 20px 10px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e0e0e0;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .price-card:active { transform: scale(0.95); border-color: var(--primary-green); }

        .saldo-label { font-size: 0.7rem; color: #777; text-transform: uppercase; display: block; }
        .saldo-valor { font-size: 1.1rem; font-weight: 800; color: var(--text-dark); margin: 5px 0; display: block; }
        .preco-tag { color: var(--primary-green); font-weight: 700; font-size: 0.9rem; }

        /* Seção de Ações */
        .action-box {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .action-box h2 { font-size: 1.1rem; margin-bottom: 15px; }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-pix { background: var(--primary-green); color: #fff; }
        .btn-wpp { background: #25d366; color: #fff; text-decoration: none; }

        #toast {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            font-size: 0.9rem;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .btn-voltar {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div id="toast">Chave PIX Copiada!</div>

<div class="container">
    <div class="header">
        <h1>RECARGA MENTORIALOPES</h1>
        <a href="referencias.html" class="btn-video">
            <i class="fas fa-play-circle"></i> ASSISTIR VÍDEO EXPLICATIVO
        </a>
    </div>

    <p style="text-align:center; font-size: 0.85rem; color: #666; margin-bottom: 20px;">Escolha o valor desejado na tabela abaixo:</p>

    <div class="price-grid">
        <script>
            const produtos = [
                {s: "400", v: "60"}, {s: "610", v: "85"}, {s: "720", v: "95"}, 
                {s: "800", v: "110"}, {s: "900", v: "120"}, {s: "1.050", v: "135"},
                {s: "1.550", v: "150"}, {s: "2.120", v: "170"}, {s: "2.550", v: "280"},
                {s: "3.500", v: "350"}, {s: "4.100", v: "400"}, {s: "5.100", v: "500"},
                {s: "6.200", v: "600"}, {s: "7.400", v: "700"}, {s: "10.200", v: "1.000"}
            ];

            produtos.forEach(p => {
                document.write(`
                    <div class="price-card">
                        <span class="saldo-label">SALDO</span>
                        <span class="saldo-valor">R$ ${p.s}</span>
                        <span class="preco-tag">Pague R$ ${p.v}</span>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="action-box">
        <h2>Finalize seu Pedido</h2>
        
        <button class="btn-main btn-pix" onclick="copyPix()">
            <i class="fas fa-copy"></i> COPIAR CHAVE PIX
        </button>

        <a href="https://wa.me/556183290023?text=Mande%20seu%20comprovante%20aq" class="btn-main btn-wpp">
            <i class="fab fa-whatsapp"></i> MANDE SEU COMPROVANTE AQ
        </a>
        
        <p style="font-size: 0.7rem; color: #999; margin-top: 10px;">
            A chave é aleatória. Copie, pague no seu banco e envie o print.
        </p>
    </div>

    <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao menu anterior</a>
</div>

<script>
    function copyPix() {
        const chave = "73207087-03ad-4b5c-9608-8e453dbafb18";
        navigator.clipboard.writeText(chave).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        });
    }
</script>

</body>
</html>
